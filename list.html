<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>検索結果 - 簡単辞典WEB</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        .navbar { background: #333; color: white; padding: 10px 20px; display: flex; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; margin-right: 20px; }
        .search-container { position: relative; flex: 1; max-width: 600px; }
        .search-bar { width: 100%; padding: 10px; border: none; border-radius: 5px; font-size: 16px; }
        .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; color: #666; }
        .main-content { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .result-item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">簡単辞典WEB</div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="単語を検索..." onkeyup="handleSearch(event)">
            <button class="clear-btn" onclick="clearSearch()">×</button>
        </div>
    </div>

    <div class="main-content">
        <h1>検索結果</h1>
        <div id="results"></div>
    </div>

    <script src="Jpdata.js"></script>
    <script src="Endata.js"></script>
    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) window.location.href = `list.html?q=${encodeURIComponent(query)}`;
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
        }

        function displayResults(query) {
            const resultsDiv = document.getElementById('results');
            const q = query.toLowerCase();
            let matches = [];
            matches = matches.concat(jpData.filter(item => 
                item.word.toLowerCase().includes(q) || item.meaning.toLowerCase().includes(q)));
            matches = matches.concat(enData.filter(item => 
                item.word.toLowerCase().includes(q) || item.meaning.toLowerCase().includes(q)));

            if (matches.length === 0) {
                resultsDiv.innerHTML = `<p>「${query}」に一致する結果はありません。</p>`;
                return;
            }

            let html = '';
            matches.forEach(item => {
                html += `<div class="result-item"><h3>${item.word}</h3><p>${item.meaning}</p></div>`;
            });
            resultsDiv.innerHTML = html;
        }

        window.onload = () => {
            const query = getQueryParam('q') || '';
            if (query) {
                document.getElementById('searchInput').value = query;
                displayResults(query);
            } else {
                document.getElementById('results').innerHTML = '<p>検索語を入力してください。</p>';
            }
        };
    </script>
</body>
</html>
