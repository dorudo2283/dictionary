<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡単辞典WEB</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #ffffff; color: #333; }
        .navbar { background: #333; color: white; padding: 10px 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; margin-right: 20px; }
        .search-container { position: relative; flex: 1; max-width: 600px; }
        .search-bar { width: 100%; padding: 10px; border: none; border-radius: 5px; font-size: 16px; box-sizing: border-box; color: #333; }
        .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; color: #666; }
        
        /* 候補（サジェスト）リスト：文字色を黒に、シンプルに文字だけに修正 */
        .suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; border-top: none; border-radius: 0 0 5px 5px; max-height: 200px; overflow-y: auto; box-sizing: border-box; display: none; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; color: #333; font-size: 16px; text-align: left; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #f0f0f0; }

        /* メインコンテンツエリア */
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        
        /* 「〇〇の検索結果...」のタイトルスタイル */
        .search-title { text-align: center; color: #777; font-style: italic; font-size: 20px; margin-bottom: 25px; }
        
        /* 辞書カード：画像に合わせた薄グレーの背景とレイアウト */
        .dictionary-card { background: #f5f5f5; padding: 30px; border-radius: 4px; margin-bottom: 20px; box-shadow: none; text-align: center; }
        
        /* ヘッダー：左側（日本語/英語）と右側（読み・ローマ字）の2カラム構成 */
        .card-header { display: flex; justify-content: space-between; align-items: flex-baseline; margin-bottom: 25px; padding-bottom: 0; border-bottom: none; }
        
        /* 左側：単語と品詞 */
        .header-left { display: flex; align-items: baseline; text-align: left; }
        .main-word { margin: 0; font-size: 36px; font-weight: bold; color: #000; }
        .pos-tag { font-size: 32px; font-weight: bold; color: #000; margin-left: 10px; }
        
        /* 右側：【分類】と読み・ローマ字 */
        .header-right { text-align: right; font-size: 14px; color: #333; }
        
        /* 意味・説明文：中央揃えで読みやすい余白 */
        .result-meaning { font-size: 18px; line-height: 1.6; color: #111; margin: 0 auto 25px auto; max-width: 650px; white-space: pre-line; text-align: center; }
        
        /* 例文セクション */
        .examples-section { display: inline-block; text-align: left; max-width: 650px; margin: 0 auto; font-size: 18px; line-height: 1.6; color: #111; }
        .example-list { list-style: none; padding: 0; margin: 0; }
        .example-list li { position: relative; padding-left: 15px; margin-bottom: 5px; }
        .example-list li::before { content: "・"; position: absolute; left: 0; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo" onclick="clearSearch()">簡単辞典</div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="単語を入力（日本語・英語・ローマ字）..." oninput="handleInput(this.value)" onkeydown="handleKeyDown(event)">
            <button class="clear-btn" onclick="clearSearch()">×</button>
            <div id="suggestions" class="suggestions"></div>
        </div>
    </div>

    <div class="container" id="content-area">
        <p style="text-align: center; color: #666;">検索バーに単語を入力してください。</p>
    </div>

    <!-- データファイルの読み込み -->
    <script src="jpdata.js"></script>
    <script src="endata.js"></script>

    <script>
        const combinedData = [...(window.jpData || []), ...(window.enData || [])];

        // 表記ゆれ吸収関数
        function cleanText(str) {
            if (!str) return '';
            let t = str.trim().toLowerCase();
            t = t.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
            });
            t = t.replace(/[\u30a1-\u30f6]/g, function(match) {
                const chr = match.charCodeAt(0) - 0x60;
                return String.fromCharCode(chr);
            });
            return t.replace(/\s+/g, '');
        }

        // サジェスト抽出
        function filterSuggestions(query) {
            if (!query) return [];
            const target = cleanText(query);

            return combinedData.filter(item => {
                const word = cleanText(item.word);
                const romaji = item.romaji ? cleanText(item.romaji) : '';
                const meaning = item.meaning ? cleanText(item.meaning) : '';
                return word.includes(target) || romaji.includes(target) || meaning.includes(target);
            });
        }

        // 本格検索抽出
        function filterExactSearch(query) {
            if (!query) return [];
            const target = cleanText(query);

            let results = combinedData.filter(item => {
                const word = cleanText(item.word);
                const romaji = item.romaji ? cleanText(item.romaji) : '';
                return word === target || romaji === target;
            });

            if (results.length === 0) {
                results = combinedData.filter(item => {
                    const word = cleanText(item.word);
                    const romaji = item.romaji ? cleanText(item.romaji) : '';
                    return word.includes(target) || romaji.includes(target);
                });
            }
            return results;
        }

        // 入力時の処理（サジェスト生成）
        function handleInput(value) {
            const suggestionsDiv = document.getElementById('suggestions');
            if (!value.trim()) {
                suggestionsDiv.style.display = 'none';
                return;
            }

            const matched = filterSuggestions(value);
            
            if (matched.length === 0) {
                suggestionsDiv.style.display = 'none';
                return;
            }

            let html = '';
            // シンプルに文字だけ（黒色）を出すように修正
            matched.slice(0, 10).forEach(item => {
                html += `<div class="suggestion-item" onclick="selectSuggestion('${item.word}')">${item.word}</div>`;
            });

            suggestionsDiv.innerHTML = html;
            suggestionsDiv.style.display = 'block';
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                const value = document.getElementById('searchInput').value;
                executeSearch(value);
            }
        }

        function selectSuggestion(word) {
            document.getElementById('searchInput').value = word;
            document.getElementById('suggestions').style.display = 'none';
            executeSearch(word);
        }

        // 検索実行と画面描画（画像のデザインを再現）
        function executeSearch(query) {
            document.getElementById('suggestions').style.display = 'none';
            const contentArea = document.getElementById('content-area');
            
            if (!query.trim()) {
                resetPage();
                return;
            }

            const results = filterExactSearch(query);

            if (results.length === 0) {
                contentArea.innerHTML = `<p style="text-align: center; color: #666;">「<strong>${query}</strong>」に一致する単語は見つかりませんでした。</p>`;
                return;
            }

            // 「〇〇」の検索結果... タイトルを最初に追加
            let html = `<div class="search-title">「${query}」の検索結果 ...</div>`;
            
            results.forEach(item => {
                let examplesHtml = '';
                if (item.examples && item.examples.length > 0) {
                    let liHtml = '';
                    item.examples.forEach(ex => {
                        liHtml += `<li>${ex}</li>`;
                    });
                    examplesHtml = `
                        <div class="examples-section">
                            <ul class="example-list">${liHtml}</ul>
                        </div>
                    `;
                }

                // 右側の「分類 - 読み/ローマ字」のテキストを組み立て
                let metaRight = '';
                if (item.pos) {
                    metaRight += `【${item.pos}】`;
                }
                if (item.romaji) {
                    metaRight += metaRight ? ` - ${item.romaji}` : item.romaji;
                }

                // 左右分割構造のカードHTML
                html += `
                    <div class="dictionary-card">
                        <div class="card-header">
                            <div class="header-left">
                                <span class="main-word">${item.word}</span>
                                <span class="pos-tag">[${item.type || '補足'}]</span>
                            </div>
                            <div class="header-right">
                                ${metaRight}
                            </div>
                        </div>
                        <p class="result-meaning">${item.meaning}</p>
                        ${examplesHtml}
                    </div>
                `;
            });

            contentArea.innerHTML = html;
        }

        // 外側クリックでサジェストを閉じる
        document.addEventListener('click', (e) => {
            const suggestionsDiv = document.getElementById('suggestions');
            const searchInput = document.getElementById('searchInput');
            if (e.target !== suggestionsDiv && e.target !== searchInput) {
                suggestionsDiv.style.display = 'none';
            }
        });

        function clearSearch() {
            resetPage();
        }

        function resetPage() {
            document.getElementById('searchInput').value = '';
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('content-area').innerHTML = '<p style="text-align: center; color: #666;">検索バーに単語を入力してください。</p>';
        }
    </script>
</body>
</html>
