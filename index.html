<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡単辞典WEB</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        .navbar { background: #333; color: white; padding: 10px 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; margin-right: 20px; }
        .search-container { position: relative; flex: 1; max-width: 600px; }
        .search-bar { width: 100%; padding: 10px; border: none; border-radius: 5px; font-size: 16px; }
        .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; color: #666; }
        .suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ddd; max-height: 300px; overflow-y: auto; z-index: 200; display: none; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .suggestion-item:hover { background: #f0f0f0; }
        .main-content { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #ddd; margin-right: 5px; border-radius: 5px 5px 0 0; }
        .tab.active { background: white; border-bottom: 2px solid #333; }
        .content-area { display: none; }
        .content-area.active { display: block; }
        .word-list { list-style: none; padding: 0; }
        .word-item { margin: 10px 0; padding: 10px; background: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo" onclick="window.location.reload()">簡単辞典WEB</div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="単語を検索..." onkeyup="handleSearch(event)">
            <button class="clear-btn" onclick="clearSearch()">×</button>
            <div id="suggestions" class="suggestions"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">ホーム</div>
            <div class="tab" onclick="switchTab(1)">日本語辞典</div>
            <div class="tab" onclick="switchTab(2)">英語辞典</div>
        </div>

        <!-- ホーム -->
        <div id="home" class="content-area active">
            <h1>ようこそ、簡単辞典WEBへ</h1>
            <p>検索バーから単語を入力して探しましょう。</p>
            <button onclick="window.location.href='list.html'">検索結果一覧を見る</button>
        </div>

        <!-- 日本語 -->
        <div id="jp" class="content-area">
            <h2>日本語辞典</h2>
            <div id="jp-content"></div>
        </div>

        <!-- 英語 -->
        <div id="en" class="content-area">
            <h2>英語辞典</h2>
            <div id="en-content"></div>
        </div>
    </div>

    <script src="Jpdata.js"></script>
    <script src="Endata.js"></script>
    <script>
        // 全単語リスト（サジェスト用）
        var allWords = [...jpData.map(item => item.word), ...enData.map(item => item.word)];

        function handleSearch(e) {
            const query = e.target.value.toLowerCase().trim();
            const suggestionsDiv = document.getElementById('suggestions');
            if (query.length === 0) {
                suggestionsDiv.style.display = 'none';
                return;
            }

            const matches = allWords.filter(word => word.toLowerCase().includes(query));
            if (matches.length > 0) {
                suggestionsDiv.innerHTML = '';
                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = match;
                    div.onclick = () => {
                        document.getElementById('searchInput').value = match;
                        suggestionsDiv.style.display = 'none';
                        performSearch(match);
                    };
                    suggestionsDiv.appendChild(div);
                });
                suggestionsDiv.style.display = 'block';
            } else {
                suggestionsDiv.style.display = 'none';
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('suggestions').style.display = 'none';
        }

        function performSearch(query) {
            window.location.href = `list.html?q=${encodeURIComponent(query)}`;
        }

        function switchTab(tabIndex) {
            document.querySelectorAll('.tab').forEach((tab, i) => tab.classList.toggle('active', i === tabIndex));
            document.querySelectorAll('.content-area').forEach((area, i) => area.classList.toggle('active', i === tabIndex));
            if (tabIndex === 1) loadJpData();
            if (tabIndex === 2) loadEnData();
        }

        function loadJpData() {
            const container = document.getElementById('jp-content');
            container.innerHTML = '<ul class="word-list">' + 
                jpData.map(item => `<li class="word-item" onclick="showDetail('${item.word}', '${item.meaning}')"><strong>${item.word}</strong>: ${item.meaning}</li>`).join('') + '</ul>';
        }

        function loadEnData() {
            const container = document.getElementById('en-content');
            container.innerHTML = '<ul class="word-list">' + 
                enData.map(item => `<li class="word-item" onclick="showDetail('${item.word}', '${item.meaning}')"><strong>${item.word}</strong>: ${item.meaning}</li>`).join('') + '</ul>';
        }

        function showDetail(word, meaning) {
            alert(`${word}: ${meaning}`);
        }
    </script>
</body>
</html>
